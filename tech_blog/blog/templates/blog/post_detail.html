<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>{{ post.title }} | Madhurti Tratiay</title>
   <style>
        /* 1. Overall Page & Content Readability */
        .content {
            line-height: 1.8;
            font-size: 1.15rem;
            color: #2c3e50;
            word-wrap: break-word;
        }

        /* 2. Interactive Image Styling */
        .content img {
            max-width: 100%;
            height: auto !important; /* Overrides CKEditor fixed height */
            border-radius: 12px;
            margin: 30px auto;
            display: block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .content img:hover {
            transform: scale(1.01); /* Subtle interactive zoom */
        }

        /* 3. Handle CKEditor Alignment (Justify/Center) */
        .content .text-center { text-align: center; }
        .content .text-right { text-align: right; }
        .content .text-justify { text-align: justify; }

        /* 4. Spacing for New Lines and Lists */
        .content p { margin-bottom: 1.5rem; }
        .content ul, .content ol { margin-bottom: 1.5rem; padding-left: 2rem; }

        /* 5. Professional Technical Code Blocks */
        pre {
            background-color: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #ee3124;
            overflow-x: auto;
            margin: 25px 0;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5 shadow">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-arrow-left"></i> Back to Blog</a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <article class="bg-white p-5 rounded shadow-sm">
                    <header class="mb-4">
                        <span class="badge bg-danger mb-2">{{ post.category.name }}</span>
                        <h1 class="fw-bold display-5">{{ post.title }}</h1>
                        <p class="text-muted">
                            <i class="far fa-calendar-alt"></i> {{ post.created_at|date:"F d, Y" }} | 
                            <i class="far fa-user"></i> {{ post.author.get_full_name|default:post.author.username }}
                        </p>
                        
                        {% if post.image %}
                        <div class="mt-4">
                            <img src="{{ post.image.url }}" class="img-fluid rounded shadow-sm w-100" style="max-height: 450px; object-fit: cover;" alt="{{ post.title }}">
                        </div>
                        {% endif %}
                        <hr class="my-4">
                    </header>
                    
                    <div class="content lh-lg" style="font-size: 1.15rem; color: #333;">
                        {{ post.content|safe }}
                    </div>
                </article>
            </div>
        </div>
    </div>
</body>
</html>
