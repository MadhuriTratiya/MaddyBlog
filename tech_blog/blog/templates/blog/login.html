{% extends "blog/base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h2 class="text-center fw-bold mb-4">Login to MaddyBlog</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold">Username</label>
                        <input type="text" name="username" class="form-control rounded-pill px-3" placeholder="Enter Username" required>
                    </div>

                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold">Password</label>
                        <div class="input-group">
                            <input type="password" name="password" id="passwordField" class="form-control border-end-0 rounded-start-pill px-3" placeholder="Enter Password" required>
                            <button class="btn btn-outline-secondary border-start-0 rounded-end-pill px-3" type="button" id="togglePassword">
                                <i class="fa fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" name="remember_me" class="form-check-input" id="rememberMe">
                            <label class="form-check-label small text-muted" for="rememberMe">Remember Me</label>
                        </div>
                        <a href="{% url 'password_reset' %}" class="small text-danger text-decoration-none">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-danger w-100 rounded-pill py-2 fw-bold mb-3 shadow-sm">Login</button>
                </form>

                <p class="text-center small text-muted">
                    New here? <a href="{% url 'register' %}" class="text-danger text-decoration-none fw-bold">Create an account</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const passwordField = document.querySelector('#passwordField');
    const eyeIcon = document.querySelector('#eyeIcon');

    togglePassword.addEventListener('click', function () {
        // Toggle the type attribute
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        
        // Toggle the icon
        eyeIcon.classList.toggle('fa-eye');
        eyeIcon.classList.toggle('fa-eye-slash');
    });
</script>

<style>
    /* Ensures inputs are standard Bootstrap height and alignment */
    .form-control:focus {
        border-color: #dc3545;
        box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
    }
    .input-group .form-control {
        z-index: 1;
    }
    .input-group .btn {
        z-index: 2;
    }
</style>
{% endblock %}
