{% extends "blog/base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-4 p-4 text-center">
                
                <div class="mb-3">
                    <i class="fas fa-lock text-danger fa-3x"></i>
                </div>
                
                <h2 class="fw-bold mb-3">Reset Password</h2>
                <p class="text-muted small mb-4">
                    Forgotten your password? Enter your email address below, and we'll email instructions for setting a new one.
                </p>

                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold">{{ field.label }}</label>
                            <input type="email" 
                                   name="{{ field.name }}" 
                                   class="form-control rounded-pill px-3 py-2" 
                                   placeholder="Enter your email address" 
                                   required>
                            
                            {% if field.errors %}
                                <div class="text-danger small mt-1 fw-bold">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-danger w-100 rounded-pill py-2 fw-bold shadow-sm mt-2">
                        Send Reset Link
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
