{% extends "blog/base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <div class="card shadow-sm border-0 rounded-4 p-5">
                
                <div class="mb-4">
                    <i class="fas fa-check-circle text-success fa-4x"></i>
                </div>
                
                <h2 class="fw-bold mb-3">Password Updated!</h2>
                
                <p class="text-muted mb-4">
                    Your password has been successfully reset. Your account is secure, and you can now log in with your new credentials.
                </p>
                
                <a href="{% url 'login' %}" class="btn btn-danger w-100 rounded-pill py-2 fw-bold shadow-sm">
                    Log In Now
                </a>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
