{% extends "blog/base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h2 class="text-center fw-bold mb-4">Change Password</h2>
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold">{{ field.label }}</label>
                            <input type="{{ field.field.widget.input_type }}" 
                                   name="{{ field.name }}" 
                                   class="form-control rounded-pill px-3" 
                                   placeholder="Enter {{ field.label }}">
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-danger w-100 rounded-pill py-2 fw-bold shadow-sm">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
